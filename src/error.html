<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>%sveltekit.status% — Bermuda Triangle Society</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			:root {
				color-scheme: light dark;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 1rem;
				background-color: #f9fafb;
				color: #111827;
				position: relative;
				overflow: hidden;
			}

			@media (prefers-color-scheme: dark) {
				body {
					background-color: #111827;
					color: #f3f4f6;
				}
			}

			.container {
				text-align: center;
				position: relative;
				z-index: 1;
			}

			.icon {
				width: 6rem;
				height: 6rem;
				margin: 0 auto 1.5rem;
				color: #a78bfa;
			}

			@media (prefers-color-scheme: dark) {
				.icon {
					color: #8b5cf6;
				}
			}

			.status-code {
				font-size: 4.5rem;
				font-weight: 800;
				letter-spacing: -0.025em;
				line-height: 1;
				color: #9333ea;
			}

			@media (prefers-color-scheme: dark) {
				.status-code {
					color: #a78bfa;
				}
			}

			h1 {
				margin-top: 1rem;
				font-size: 1.875rem;
				font-weight: 700;
				color: #111827;
			}

			@media (prefers-color-scheme: dark) {
				h1 {
					color: #f3f4f6;
				}
			}

			.description {
				margin-top: 1rem;
				max-width: 28rem;
				margin-left: auto;
				margin-right: auto;
				font-size: 1rem;
				line-height: 1.625;
				color: #6b7280;
			}

			@media (prefers-color-scheme: dark) {
				.description {
					color: #9ca3af;
				}
			}

			.error-message {
				margin-top: 0.5rem;
				max-width: 28rem;
				margin-left: auto;
				margin-right: auto;
				font-size: 0.875rem;
				font-style: italic;
				color: #9ca3af;
			}

			@media (prefers-color-scheme: dark) {
				.error-message {
					color: #6b7280;
				}
			}

			.actions {
				margin-top: 2.5rem;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0.75rem;
			}

			@media (min-width: 640px) {
				.actions {
					flex-direction: row;
					justify-content: center;
				}
			}

			.btn {
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				padding: 0.625rem 1.25rem;
				font-size: 0.875rem;
				font-weight: 600;
				border-radius: 0.375rem;
				text-decoration: none;
				cursor: pointer;
				border: none;
				line-height: 1.25rem;
				transition: background-color 0.15s ease;
			}

			.btn-primary {
				background-color: #9333ea;
				color: #fff;
				box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
			}

			.btn-primary:hover {
				background-color: #7e22ce;
			}

			@media (prefers-color-scheme: dark) {
				.btn-primary {
					background-color: #8b5cf6;
				}
				.btn-primary:hover {
					background-color: #9333ea;
				}
			}

			.btn-secondary {
				background-color: #fff;
				color: #374151;
				border: 1px solid #d1d5db;
				box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
			}

			.btn-secondary:hover {
				background-color: #f9fafb;
			}

			@media (prefers-color-scheme: dark) {
				.btn-secondary {
					background-color: #1f2937;
					color: #d1d5db;
					border-color: #4b5563;
				}
				.btn-secondary:hover {
					background-color: #374151;
				}
			}

			.btn svg {
				width: 1rem;
				height: 1rem;
			}

			.bg-decoration {
				position: absolute;
				inset: 0;
				overflow: hidden;
				pointer-events: none;
				opacity: 0.05;
			}

			@media (prefers-color-scheme: dark) {
				.bg-decoration {
					opacity: 0.03;
				}
			}

			.bg-decoration svg {
				position: absolute;
				top: 50%;
				left: 50%;
				width: 600px;
				height: 600px;
				transform: translate(-50%, -50%);
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="icon">
				<!-- Warning triangle icon -->
				<svg
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.2"
					stroke="currentColor"
					width="100%"
					height="100%"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
					/>
				</svg>
			</div>

			<p class="status-code">%sveltekit.status%</p>

			<h1>%sveltekit.error.message%</h1>

			<p class="description">An error occurred before the page could be rendered.</p>

			<div class="actions">
				<a href="/" class="btn btn-primary">
					<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"
						/>
					</svg>
					Go Home
				</a>
				<button onclick="history.back()" class="btn btn-secondary">
					<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3"
						/>
					</svg>
					Go Back
				</button>
			</div>
		</div>

		<!-- Decorative triangles in background -->
		<div class="bg-decoration" aria-hidden="true">
			<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="0.5">
				<polygon points="50,5 95,90 5,90" />
				<polygon points="50,15 85,82 15,82" />
				<polygon points="50,25 75,74 25,74" />
			</svg>
		</div>
	</body>
</html>
